name: quality-gate

on:
  push:
    paths:
      - "apps/server/src/**"
      - ".github/workflows/quality-gate.yml"
  pull_request:
    paths:
      - "apps/server/src/**"
      - ".github/workflows/quality-gate.yml"

jobs:
  contract-and-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server/src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r ../requirements.txt

      - name: Run quality gate contract tests
        run: python -m unittest test_quality_gate_contract.py